version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gamenight-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gamenight
      MYSQL_USER: gamenight
      MYSQL_PASSWORD: gamenightpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamenight-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: gamenight
      DB_USER: gamenight
      DB_PASSWORD: gamenightpass
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      OPENWEATHER_API_KEY: aa2a62d94c2a39af87c270df549515a9
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamenight-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm start

volumes:
  mysql_data:
